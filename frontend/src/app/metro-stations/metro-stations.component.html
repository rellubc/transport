<h1>metro-stations works!</h1>
<div>
    <p> {{ currentShapeIndex }}: {{shapeIds[currentShapeIndex] }} </p>
    <button (click)="nextShapeIndex()">Click</button>
    <div id="map" class="map-container"></div>
    <p>Total stations: {{ stations.length }}</p>
    <div *ngFor="let station of stations">
        <p>{{ station.name }}</p>
    </div>
    <p>Total stations: {{ platforms.length }}</p>
    <div *ngFor="let platform of platforms">
        <p>{{ platform.name }}</p>
    </div>
</div>
